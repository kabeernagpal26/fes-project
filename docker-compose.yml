version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stock_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: stock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stock_cache
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: stock_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/stock_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=9e87d46c82305a41bf39d1b640169ad26be0eb2a1dcdb57f0fa8014a6dc2458a
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
